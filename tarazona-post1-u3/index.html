<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil — Kevin Tarazona</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

<header class="site-header">
  <div class="header-inner">
    <span class="logo">Mi Portafolio</span>
    <nav class="main-nav">
      <a href="#perfil">Perfil</a>
      <a href="#habilidades">Habilidades</a>
      <a href="#contacto">Contacto</a>
    </nav>
  </div>
</header>

<main>

<section id="perfil" class="profile-section">
  <div class="profile-card">

    <div class="avatar-wrapper">
      <img src="img/perfil.jpg" class="avatar">
      <span class="badge">CSS3</span>
    </div>

    <div class="profile-info">
      <h1 class="profile-name">Kevin Tarazona</h1>
      <p class="profile-title">Estudiante de Ingeniería de Sistemas</p>
      <p class="profile-bio">
        Apasionado por el desarrollo web, enfocado en aprender tecnologías como HTML, CSS y JavaScript.
      </p>
    </div>

  </div>
</section>

<section id="habilidades" class="skills-section">
  <h2 class="section-title">Habilidades</h2>

  <ul class="skills-list">
    <li class="skill-item skill-item--html">HTML5</li>
    <li class="skill-item skill-item--css">CSS3</li>
    <li class="skill-item skill-item--js">JavaScript</li>
    <li class="skill-item skill-item--java">Java</li>
  </ul>
</section>

<section id="contacto" class="contact-section">
  <h2 class="section-title">Contacto</h2>

  <form class="contact-form">
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" placeholder="Tu nombre">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="correo@ejemplo.com">
    </div>

    <div class="form-group">
      <label>Mensaje</label>
      <textarea placeholder="Escribe aquí..."></textarea>
    </div>

    <button class="btn-primary">Enviar</button>
  </form>
</section>

</main>

<footer class="site-footer">
  <p>© 2026 — Kevin Tarazona</p>
</footer>

</body>
</html>
